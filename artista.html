<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espacio Romero - El Artista</title>
  <meta name="description" content="Historia y visión artística detrás de Espacio Romero.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{'brand-red':'#cc0000','brand-black':'#0a0a0a'}}}};</script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-brand-black text-white">
  <nav class="fixed w-full z-50 bg-black/90 border-b border-brand-red/30">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <a href="./index.html" class="text-2xl font-serif font-bold tracking-widest text-brand-red">ESPACIO <span class="text-white">ROMERO</span></a>
      <div class="hidden md:flex items-center space-x-6 text-xs uppercase tracking-widest font-semibold text-gray-200">
        <a href="./index.html">Inicio</a><a href="./alojamiento.html">Alojamiento</a><a href="./artista.html" class="text-brand-red">El Artista</a><div class="relative nav-dropdown-wrapper inline-block"><a href="./tienda.html">Tienda</a><div class="absolute left-0 top-full pt-3 nav-dropdown"><div class="bg-black border border-brand-red/40 rounded-sm shadow-lg min-w-[200px] overflow-hidden"><a href="./tienda.html#tienda-obras" class="block px-4 py-3 text-xs uppercase tracking-widest text-gray-200 hover:bg-white hover:text-black">Obras</a><a href="./tienda.html#tienda-artesanias" class="block px-4 py-3 text-xs uppercase tracking-widest text-gray-200 hover:bg-white hover:text-black">Artesanías</a><a href="./tienda.html#tienda-remeras" class="block px-4 py-3 text-xs uppercase tracking-widest text-gray-200 hover:bg-white hover:text-black">Remeras</a><a href="./catalogo.html" class="block px-4 py-3 text-xs uppercase tracking-widest text-gray-200 hover:bg-white hover:text-black border-t border-zinc-800">Catálogo completo</a></div></div></div><a href="./resenas.html">Reseñas</a><a href="./contacto.html">Contacto</a>
      </div>
      <button class="md:hidden text-white text-2xl" id="menu-btn" aria-label="Abrir menú"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-brand-red/30 bg-black/95">
      <div class="container mx-auto px-6 py-6 flex flex-col gap-4 text-sm uppercase tracking-widest font-semibold text-gray-200">
        <a href="./index.html">Inicio</a><a href="./alojamiento.html">Alojamiento</a><a href="./artista.html" class="text-brand-red">El Artista</a>
        <div class="space-y-2">
          <a href="./tienda.html">Tienda</a>
          <div class="pl-4 flex flex-col gap-2 text-xs font-semibold uppercase tracking-widest text-gray-400">
            <a href="./tienda.html#tienda-obras" class="hover:text-white transition">Obras</a>
            <a href="./tienda.html#tienda-artesanias" class="hover:text-white transition">Artesanías</a>
            <a href="./tienda.html#tienda-remeras" class="hover:text-white transition">Remeras</a>
            <a href="./catalogo.html" class="hover:text-white transition">Catálogo completo</a>
          </div>
        </div>
        <a href="./resenas.html">Reseñas</a><a href="./contacto.html">Contacto</a>
      </div>
    </div>
  </nav>

  <main class="pt-32 pb-24 px-6 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-64 h-64 bg-brand-red/5 rounded-full blur-3xl -z-10 animate-pulse"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-brand-red/5 rounded-full blur-3xl -z-10 animate-pulse" style="animation-delay: 2s"></div>
    
    <div class="container mx-auto">
      <div class="grid lg:grid-cols-12 gap-16 items-center">
        <div class="lg:col-span-6 reveal group">
          <div class="relative artist-bio-img-wrap mb-6">
            <img src="img/foto13.jpeg" data-edit-image="artista_hero_extra" data-edit-label="Imagen decorativa superior" class="w-full h-32 object-cover rounded-sm border border-brand-red/10 grayscale hover:grayscale-0 transition-all">
          </div>
          <div class="relative artist-bio-img-wrap">
            <div class="absolute -inset-4 border border-brand-red/20 scale-95 group-hover:scale-100 transition-transform duration-700"></div>
            <img src="img/foto2.jpeg" data-fallback="img/foto3.jpeg" data-edit-image="artista_img_1" data-edit-label="Foto principal" alt="Espacio Romero" class="relative z-10 rounded-sm shadow-2xl w-full h-[550px] object-cover grayscale-[0.3] group-hover:grayscale-0 transition-all duration-700">
            <div class="absolute -bottom-6 -right-6 w-32 h-32 bg-brand-red -z-10 hidden md:block"></div>
          </div>
          <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="relative group/sub overflow-hidden rounded-sm artist-bio-img-wrap">
               <img src="img/foto4.jpeg" data-edit-image="artista_sub_1" data-edit-label="Foto secundaria 1" class="w-full h-40 object-cover hover:scale-110 transition-transform duration-500">
            </div>
            <div class="relative group/sub overflow-hidden rounded-sm artist-bio-img-wrap">
               <img src="img/foto5.jpeg" data-edit-image="artista_sub_2" data-edit-label="Foto secundaria 2" class="w-full h-40 object-cover hover:scale-110 transition-transform duration-500">
            </div>
          </div>
        </div>
        <div class="lg:col-span-6 reveal">
          <span data-edit-key="artista_subtitle" data-edit-label="Subtítulo pequeño" class="text-brand-red uppercase tracking-[0.3em] font-bold text-xs mb-4 block">&nbsp;</span>
          <h1 data-edit-key="artista_titulo" data-edit-label="Título principal" class="text-5xl md:text-7xl font-serif font-bold mb-8 leading-tight">&nbsp;</h1>
          <div class="space-y-6 text-lg text-gray-300 leading-relaxed reveal">
            <p data-edit-key="artista_parrafo_1" data-edit-label="Primer párrafo" class="artist-bio-text">&nbsp;</p>
            <p data-edit-key="artista_parrafo_2" data-edit-label="Segundo párrafo" class="artist-bio-text">&nbsp;</p>
            <p data-edit-key="artista_parrafo_3" data-edit-label="Tercer párrafo (Biografía)" class="artist-bio-text text-sm !text-gray-400">&nbsp;</p>
          </div>
          <div id="artista-bio-fotos" data-edit-gallery="artista_bio_fotos" data-edit-label="Fotos de la Biografía" class="mt-12 grid grid-cols-2 md:grid-cols-3 gap-6 reveal">
            <!-- Fotos de la biografía -->
          </div>
          <div class="mt-12 flex flex-wrap gap-6">
            <a data-edit-key="artista_cta" data-edit-label="Botón principal" href="./tienda.html" class="btn btn-primary px-8 py-4">Explorar su obra <i class="fas fa-arrow-right ml-2"></i></a>
            <div class="flex items-center gap-4 text-gray-400">
              <div class="w-12 h-px bg-zinc-700"></div>
              <span data-edit-key="artista_footer_note" data-edit-label="Nota al pie" class="text-sm italic">Obras disponibles para adquisición</span>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-32 reveal">
        <h2 data-edit-key="artista_galeria_titulo" data-edit-label="Título Galería" class="text-4xl font-serif font-bold mb-10 text-center">&nbsp;</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
           <div class="relative group overflow-hidden rounded-sm artist-bio-img-wrap h-64">
              <img src="img/foto9.jpeg" data-edit-image="art_gal_1" data-edit-label="Galería Foto 1" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
           </div>
           <div class="relative group overflow-hidden rounded-sm artist-bio-img-wrap h-64">
              <img src="img/foto10.jpeg" data-edit-image="art_gal_2" data-edit-label="Galería Foto 2" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
           </div>
           <div class="relative group overflow-hidden rounded-sm artist-bio-img-wrap h-64">
              <img src="img/foto11.jpeg" data-edit-image="art_gal_3" data-edit-label="Galería Foto 3" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
           </div>
           <div class="relative group overflow-hidden rounded-sm artist-bio-img-wrap h-64">
              <img src="img/foto12.jpeg" data-edit-image="art_gal_4" data-edit-label="Galería Foto 4" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
           </div>
        </div>
        <div id="artista-galeria-root" data-edit-gallery="artista_galeria" data-edit-label="Galería dinámica del Artista" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
          <!-- Las fotos se cargarán dinámicamente -->
        </div>
      </div>

      <div class="mt-32 grid md:grid-cols-3 gap-12 reveal">
        <div class="text-center p-8 border border-zinc-800/50 hover:border-brand-red/30 transition-colors bg-zinc-900/20 backdrop-blur-sm rounded-xl tilt-card">
          <div class="mb-6 relative overflow-hidden rounded-lg h-48">
            <img src="img/foto6.jpeg" data-edit-image="art_val_1_img" data-edit-label="Imagen Visión" class="w-full h-full object-cover">
          </div>
          <div class="text-3xl text-brand-red mb-6"><i class="fas fa-eye"></i></div>
          <h3 data-edit-key="art_val_1_t" data-edit-label="Valor 1: Título" class="text-xl font-serif font-bold mb-4">&nbsp;</h3>
          <p data-edit-key="art_val_1_d" data-edit-label="Valor 1: Desc." class="text-gray-400 text-sm leading-relaxed">&nbsp;</p>
        </div>
        <div class="text-center p-8 border border-zinc-800/50 hover:border-brand-red/30 transition-colors bg-zinc-900/20 backdrop-blur-sm rounded-xl tilt-card">
          <div class="mb-6 relative overflow-hidden rounded-lg h-48">
            <img src="img/foto7.jpeg" data-edit-image="art_val_2_img" data-edit-label="Imagen Pasión" class="w-full h-full object-cover">
          </div>
          <div class="text-3xl text-brand-red mb-6"><i class="fas fa-hand-holding-heart"></i></div>
          <h3 data-edit-key="art_val_2_t" data-edit-label="Valor 2: Título" class="text-xl font-serif font-bold mb-4">&nbsp;</h3>
          <p data-edit-key="art_val_2_d" data-edit-label="Valor 2: Desc." class="text-gray-400 text-sm leading-relaxed">&nbsp;</p>
        </div>
        <div class="text-center p-8 border border-zinc-800/50 hover:border-brand-red/30 transition-colors bg-zinc-900/20 backdrop-blur-sm rounded-xl tilt-card">
          <div class="mb-6 relative overflow-hidden rounded-lg h-48">
            <img src="img/foto8.jpeg" data-edit-image="art_val_3_img" data-edit-label="Imagen Legado" class="w-full h-full object-cover">
          </div>
          <div class="text-3xl text-brand-red mb-6"><i class="fas fa-monument"></i></div>
          <h3 data-edit-key="art_val_3_t" data-edit-label="Valor 3: Título" class="text-xl font-serif font-bold mb-4">&nbsp;</h3>
          <p data-edit-key="art_val_3_d" data-edit-label="Valor 3: Desc." class="text-gray-400 text-sm leading-relaxed">&nbsp;</p>
        </div>
      </div>
    </div>
  </main>

  <script src="./app.js" defer></script>
  <script src="./store-sync.js" defer></script>
</body>
</html>
